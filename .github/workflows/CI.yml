name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [ 12, 14, 16 ]

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v3
        with:
          persist-credentials: false

      - name: Setup Node 🎯
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies 💿
        run: npm ci

      - name: Run linter ⚡
        run: npm run lint

      - name: Run tests ✅
        run: npm test

      - name: Run build 🔨
        run: npm run build
